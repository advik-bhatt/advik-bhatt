      <text x="160" y="212" fill="#74F6FF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="12" letter-spacing="2">FRONTEND</text>
      <text x="160" y="246" fill="#F5FBFF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="20" font-weight="700">React UI</text>
      <text x="160" y="270" fill="#A8BCD4" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="13">product surfaces</text>
      <text x="160" y="288" fill="#A8BCD4" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="13">interaction flows</text>
    </g>

    <g>
      <rect x="136" y="388" width="184" height="108" rx="18" fill="#08131F" stroke="#23486C"/>
      <text x="160" y="416" fill="#74F6FF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="12" letter-spacing="2">BACKEND</text>
      <text x="160" y="450" fill="#F5FBFF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="20" font-weight="700">Node APIs</text>
      <text x="160" y="474" fill="#A8BCD4" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="13">auth + business logic</text>
      <text x="160" y="492" fill="#A8BCD4" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="13">multi-user systems</text>
    </g>

    <g>
      <rect x="840" y="184" width="300" height="108" rx="18" fill="#08131F" stroke="#23486C"/>
      <text x="864" y="212" fill="#74F6FF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="12" letter-spacing="2">AI SYSTEMS</text>
      <text x="864" y="246" fill="#F5FBFF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="20" font-weight="700">LLM Features</text>
      <text x="864" y="270" fill="#A8BCD4" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="13">structured outputs</text>
      <text x="864" y="288" fill="#A8BCD4" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="13">workflow integration</text>
    </g>

    <g>
      <rect x="840" y="388" width="300" height="108" rx="18" fill="#08131F" stroke="#23486C"/>
      <text x="864" y="416" fill="#74F6FF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="12" letter-spacing="2">DATA</text>
      <text x="864" y="450" fill="#F5FBFF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="20" font-weight="700">Pipelines + Analytics</text>
      <text x="864" y="474" fill="#A8BCD4" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="13">etl + transformations</text>
      <text x="864" y="492" fill="#A8BCD4" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="13">reporting + product data</text>
    </g>

    <g transform="translate(404 170)">
      <rect x="0" y="0" width="372" height="344" rx="26" fill="#091322" stroke="#295278"/>
      <rect x="24" y="24" width="324" height="64" rx="14" fill="#0B1728" stroke="#23486C"/>
      <text x="44" y="50" fill="#74F6FF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="12" letter-spacing="2">PROFILE</text>
      <text x="44" y="78" fill="#F5FBFF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="26" font-weight="700">ADVIK BHATT</text>

      <text x="28" y="126" fill="#63E6FF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="14" letter-spacing="2">WHAT I BUILD</text>
      <text x="28" y="156" fill="#F2F8FF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="18">Fullstack products, AI features,</text>
      <text x="28" y="180" fill="#F2F8FF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="18">and data workflows with real users.</text>

      <text x="28" y="226" fill="#63E6FF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="14" letter-spacing="2">DELIVERY LAYERS</text>
      <text x="28" y="256" fill="#A7B9D4" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="16">frontend   backend   data   AI systems</text>

      <text x="28" y="300" fill="#63E6FF" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="14" letter-spacing="2">PRODUCT THEMES</text>
      <text x="28" y="330" fill="#A7B9D4" font-family="'SFMono-Regular', Consolas, Menlo, monospace" font-size="16">marketplaces   devtools   intake flows</text>
