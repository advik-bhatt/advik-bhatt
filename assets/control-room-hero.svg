        <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="590" cy="250" r="5" fill="#63E6FF">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="520" cy="442" r="5" fill="#63E6FF">
        <animate attributeName="r" values="4;6.5;4" dur="2.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="594" cy="478" r="5" fill="#C650FF">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="840" cy="250" r="5" fill="#63E6FF">
        <animate attributeName="r" values="4;7;4" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="838" cy="478" r="5" fill="#C650FF">
        <animate attributeName="r" values="4;7;4" dur="2.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g>
